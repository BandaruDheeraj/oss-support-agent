services:
  - type: web
    name: oss-support-agent
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true

    # Docker runtime: see ./Dockerfile. The custom image installs python3 +
    # python3-venv + git, which Render's stock node runtime is missing and
    # which the repro/fix sandbox needs to bootstrap `.agent-venv` per
    # workspace. Without these the v2 Executor cannot run a single pip
    # install and stalls every issue at "repro-not-runnable".
    dockerfilePath: ./Dockerfile

    healthCheckPath: /healthz

    # Single instance only. The Gmail watcher keeps an in-memory cursor and
    # dual replicas would race / double-process replies.
    numInstances: 1

    # NOTE: Free plan has no persistent disk and sleeps after 15 min idle.
    # State will reset on restart and Gmail watcher pauses while asleep.
    # Upgrade to "starter" + uncomment the disk block below for production.
    # disk:
    #   name: state
    #   mountPath: /var/data
    #   sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: STATE_ROOT
        value: /tmp/oss-agent/state
      - key: WORKSPACE_ROOT
        value: /tmp/oss-agent/workspaces

      # Required — set these in the Render dashboard (mark as secret)
      - key: GITHUB_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DEFAULT_FORK_ORG
        sync: false

      # Required for live mail flows (PM design loop + introspection auto-onboarding)
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_ADDRESS
        sync: false
      - key: RESEND_REPLY_TO_BASE
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false

      # Optional — falls back to heuristic LLM if absent
      - key: OPENROUTER_API_KEY
        sync: false

      # Optional — git author for fix commits
      - key: GIT_AUTHOR_NAME
        value: oss-support-agent
      - key: GIT_AUTHOR_EMAIL
        value: agent@users.noreply.github.com
